<!doctype html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>誰有好眼力？</title><link rel="stylesheet" href="style.css"/></head>
<body><main id="app">
<section id="lobby" class="screen active"><h1>誰有好眼力？</h1><p class="subtitle">色彩同化 × 雙人PK</p><div class="cardPanel"><label>暱稱<input id="nameInput" placeholder="輸入你的名字"/></label><button id="createBtn">建立房間</button><div class="joinBox"><input id="roomInput" placeholder="輸入房號" maxlength="4"/><button id="joinBtn">加入</button></div><div id="message"></div></div></section>
<section id="game" class="screen"><div class="topbar"><button id="leaveBtn">離開</button><div>房號：<b id="roomCode">----</b></div><div>你是：<b id="yourSlot">?</b></div></div>
<section id="waitingPanel" class="panel"><h2>等待另一位玩家加入</h2><p id="playersText"></p></section>
<section id="instructionPanel" class="panel hidden"><h2>遊戲規則</h2><p>1. 系統每回合會顯示一個目標顏色。</p><p>2. 雙方拿到完全相同的手牌，選出中心圓最接近目標色的卡牌。</p><p>3. 線條與底色會造成色彩同化，影響判斷。</p><p>4. 功能牌固定在手牌後方：背景反轉、條紋變細、對比強化。</p><p>5. 功能牌不會改變中心圓真正 RGB，只會改變視覺背景。</p><p>6. 每回合 60 秒，共 5 回合，分數高者獲勝。</p><div id="readyStatus" class="readyStatus">等待雙方確認...</div><button id="readyBtn">我知道了</button></section>
<section id="countdownPanel" class="panel hidden"><h2>遊戲即將開始</h2><div id="countdownText" class="countdownText">3</div></section>
<section id="gamePanel" class="hidden"><div class="roundbar"><div>回合 <b id="roundText">1/5</b></div><div>倒數 <b id="timerText">60</b>s</div><div>A <b id="scoreA">0</b> : <b id="scoreB">0</b> B</div></div><section class="target panel"><div id="targetSwatch"></div><div><div class="small">目標顏色</div><div id="targetText">請選擇最接近的顏色</div></div></section><div id="status" class="status"></div><div id="messageBar" class="messageBar"></div><h3>你的手牌</h3><div id="hand" class="hand"></div><section id="revealPanel" class="panel hidden"><h2>本回合結果</h2><div id="resultText"></div><div id="revealCards" class="revealCards"></div><button id="nextBtn">下一回合</button></section><section id="endPanel" class="panel hidden"><h2>遊戲結束</h2><div id="winnerText"></div><div id="researchText"></div><button id="restartBtn">重新開始同房間</button></section></section></section></main><script src="/socket.io/socket.io.js"></script><script src="script.js"></script></body></html>
