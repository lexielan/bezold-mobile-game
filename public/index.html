<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>誰有好眼力？</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main id="app">
    <section id="lobby" class="screen active">
      <h1>誰有好眼力？</h1>
      <p class="subtitle">色彩同化 × 辨識正確顏色</p>
      <div class="cardPanel">
        <label>暱稱<input id="nameInput" placeholder="輸入你的名字"/></label>
        <button id="createBtn">建立房間</button>
        <div class="joinBox">
          <input id="roomInput" placeholder="輸入房號" maxlength="4"/>
          <button id="joinBtn">加入</button>
        </div>
        <div id="message"></div>
      </div>
    </section>

    <section id="game" class="screen">
      <div class="topbar">
        <button id="leaveBtn">離開</button>
        <div>房號：<b id="roomCode">----</b></div>
        <div>你是：<b id="yourSlot">?</b></div>
      </div>

      <section id="waitingPanel" class="panel">
        <h2>等待另一位玩家加入</h2>
        <p id="playersText"></p>
      </section>

      <section id="instructionPanel" class="panel hidden">
        <h2>遊戲規則</h2>
        <p>1. 在色彩同化的影響下，選出指定顏色的卡牌。</p>
        <p>2. 可以先使用「功能牌」，功能牌的效果為「對方卡牌底色與線條顏色交換」可影響對方的視覺效果。</p>
        <p>3. 每回合 60 秒，共 5 回合。選到正確答案者得分；若雙方都選對，先出牌者得分。</p>
        <div id="readyStatus" class="readyStatus">等待雙方確認...</div>
        <button id="readyBtn">我知道了</button>
      </section>

      <section id="countdownPanel" class="panel hidden">
        <h2>遊戲即將開始</h2>
        <div id="countdownText" class="countdownText">3</div>
      </section>

      <section id="gamePanel" class="hidden">
        <div class="roundbar">
          <div>回合 <b id="roundText">1/5</b></div>
          <div>倒數 <b id="timerText">60</b>s</div>
          <div>A <b id="scoreA">0</b> : <b id="scoreB">0</b> B</div>
        </div>

        <section class="target panel">
          <div id="targetSwatch"></div>
          <div>
            <div class="small">目標顏色</div>
            <div id="targetText">請找出正確答案</div>
          </div>
        </section>

        <div id="status" class="status"></div>
        <div id="messageBar" class="messageBar"></div>

        <h3>你的手牌</h3>
        <div id="hand" class="hand"></div>

        <section id="revealPanel" class="panel hidden">
          <h2>本回合結果</h2>
          <div id="resultText"></div>
          <div id="revealCards" class="revealCards"></div>
          <button id="nextBtn">下一回合</button>
        </section>

        <section id="endPanel" class="panel hidden">
          <h2>遊戲結束</h2>
          <div id="winnerText"></div>
          <div id="researchText"></div>
          <button id="restartBtn">再玩一次</button>
        </section>
      </section>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
