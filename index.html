<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>誰有好眼力？手機連線PK</title><link rel="stylesheet" href="style.css"/></head><body>
<main id="app">
<section id="lobby" class="screen active"><h1>誰有好眼力？</h1><p class="subtitle">色彩同化 × 手機連線雙人 PK</p><label>暱稱<input id="nameInput" placeholder="輸入你的名字"/></label><button id="createBtn">建立房間</button><div class="joinBox"><input id="roomInput" placeholder="輸入房號" maxlength="4"/><button id="joinBtn">加入</button></div><p class="tip">一人建立房間，另一人輸入房號加入。</p><div id="message"></div></section>
<section id="game" class="screen"><div class="topbar"><button onclick="location.reload()">離開</button><div>房號：<b id="roomCode">----</b></div><div>你是：<b id="yourSlot">?</b></div></div><div id="waitingPanel" class="panel"><h2>等待玩家加入</h2><p id="playersText"></p><button id="startBtn">開始遊戲</button></div><div id="gamePanel" class="hidden"><div class="roundbar"><div>回合 <b id="roundText">1/5</b></div><div>倒數 <b id="timerText">60</b>s</div><div>A <b id="scoreA">0</b> : <b id="scoreB">0</b> B</div></div><div class="target"><div id="targetSwatch"></div><div><div class="small">目標顏色</div><div id="targetText">RGB(---)</div></div></div><div id="status" class="status"></div><h3>你的手牌</h3><div id="hand" class="hand"></div><section id="revealPanel" class="panel hidden"><h2>本回合結果</h2><div id="resultText"></div><button id="nextBtn">下一回合</button></section><section id="endPanel" class="panel hidden"><h2>遊戲結束</h2><div id="winnerText"></div><div id="researchText"></div><button id="downloadCsvBtn">下載研究資料 CSV</button></section></div></section>
</main><script src="/socket.io/socket.io.js"></script><script src="script.js"></script></body></html>
